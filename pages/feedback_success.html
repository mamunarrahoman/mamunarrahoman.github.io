<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Submitted</title>

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        .success-card {
            width: 90%;
            max-width: 550px;
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 25px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
            animation: pop .8s ease;
        }

        @keyframes pop{
            from{
                transform:scale(.8);
                opacity:0;
            }
            to{
                transform:scale(1);
                opacity:1;
            }
        }

        .icon{
            width:110px;
            height:110px;
            background:#22c55e;
            border-radius:50%;
            margin:auto;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:65px;
            color:#fff;
            box-shadow:0 0 40px rgba(34,197,94,.45);
        }

        h1{
            margin-top:30px;
            font-size:2rem;
            font-weight:700;
        }

        p{
            margin:18px auto 35px;
            color:#d1d5db;
            line-height:1.8;
            max-width:430px;
        }

        .btn-group{
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
        }

        .btn{
            text-decoration:none;
            padding:14px 28px;
            border-radius:50px;
            font-weight:600;
            transition:.3s;
        }

        .btn-home{
            background:#3b82f6;
            color:#fff;
        }

        .btn-home:hover{
            background:#2563eb;
            transform:translateY(-3px);
        }

        .btn-question{
            border:2px solid rgba(255,255,255,.2);
            color:#fff;
        }

        .btn-question:hover{
            background:rgba(255,255,255,.08);
            transform:translateY(-3px);
        }

        .footer{
            margin-top:35px;
            font-size:.9rem;
            color:#94a3b8;
        }

        canvas{
            position:absolute;
            inset:0;
            z-index:-1;
        }
    </style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="success-card">

    <div class="icon">
        <i class='bx bx-check'></i>
    </div>

    <h1>Question Submitted!</h1>

    <p>
        Thank you for reaching out.
        Your question has been successfully delivered.
        I'll review it carefully and respond to your email as soon as possible.
    </p>

    <div class="btn-group">
        <a href="index.html" class="btn btn-home">
            <i class='bx bx-home'></i> Back to Portfolio
        </a>

        <a href="index.html#qa-section" class="btn btn-question">
            Ask Another
        </a>
    </div>

    <div class="footer">
        Have a wonderful day!
    </div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
dx:(Math.random()-.5)*.5,
dy:(Math.random()-.5)*.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,.5)";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});

requestAnimationFrame(animate);
}

animate();

window.onresize=()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
}
</script>

</body>
</html>
