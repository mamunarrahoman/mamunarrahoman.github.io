<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCL Viewer</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: white;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .box {
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);

        background: #000;
        border-radius: 18px;

        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
    }

    h2 { color: white; margin: 0 0 10px 0; }

    .meta {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 10px;
        word-break: break-all;
    }

    .editor {
        flex: 1;
        background: #111;
        border-radius: 12px;
        overflow: auto;
        font-family: Consolas, monospace;
        font-size: 14px;
        color: #e2e8f0;
        padding: 20px;
        white-space: pre-wrap;
    }

    .status {
        color: #94a3b8;
        font-size: 12px;
        margin-top: 10px;
    }

    .kw { color: #60a5fa; }
    .com { color: #6b7280; font-style: italic; }
</style>
</head>

<body>

<div class="box">
    <h2>💻 ALU Verilog Code</h2>

    <div class="meta" id="sourceUrl"></div>

    <div class="editor" id="content">Loading...</div>

    <div class="status" id="status"></div>
</div>

<script>

const fileURL = "https://raw.githubusercontent.com/mamunarrahoman/back_end_flow/main/input_files/alu_4bit.v";

document.getElementById("sourceUrl").textContent = fileURL;

function escapeHTML(str) {
    return str.replace(/&/g,"&amp;")
              .replace(/</g,"&lt;")
              .replace(/>/g,"&gt;");
}

function highlight(text) {

    const lines = text.split("\n");

    const keywords = [
        "set","proc","if","else","foreach","for","while",
        "module","endmodule","assign","always","begin","end",
        "input","output","wire","reg","logic","parameter"
    ];

    function processLine(line) {

        let safe = escapeHTML(line);

        let commentStart = safe.length;

        const i1 = safe.indexOf("#");
        const i2 = safe.indexOf("//");
        const i3 = safe.indexOf("--");

        const arr = [i1, i2, i3].filter(i => i !== -1);

        if (arr.length > 0) {
            commentStart = Math.min(...arr);
        }

        let code = safe.substring(0, commentStart);
        let comment = safe.substring(commentStart);

        keywords.forEach(k => {
            const r = new RegExp("\\b" + k + "\\b", "g");
            code = code.replace(r, `<span class="kw">${k}</span>`);
        });

        if (commentStart !== safe.length) {
            comment = `<span class="com">${comment}</span>`;
        } else {
            comment = "";
        }

        return code + comment;
    }

    return lines.map(processLine).join("\n");
}

async function loadFile() {
    try {
        document.getElementById("status").textContent = "Loading TCL file...";

        const res = await fetch(fileURL);
        const text = await res.text();

        document.getElementById("content").innerHTML = highlight(text);

        document.getElementById("status").textContent = "Loaded successfully";
    } catch (e) {
        document.getElementById("content").textContent = "Error loading file";
        document.getElementById("status").textContent = "Failed";
    }
}

loadFile();

</script>

</body>
</html>
